<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f4f7fb;
}

/* HERO */
.hero {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
    padding: 50px 20px;
    text-align: center;
}

.hero h1 {
    margin: 0;
    font-size: 32px;
}

/* BUTTONS */
.btn {
    padding: 12px 20px;
    border-radius: 25px;
    text-decoration: none;
    color: white;
    margin: 5px;
    display: inline-block;
}

.call { background: #ff9800; }
.whatsapp { background: #25D366; }

/* CONTAINER */
.container {
    padding: 20px;
}

/* BOX */
.box {
    background: white;
    margin-bottom: 20px;
    padding: 20px;
    border-radius: 15px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
}

/* SERVICE GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
}

/* CARTOON ICON */
.service {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
}

.service img {
    width: 80px;
    height: 80px;
    margin-bottom: 10px;
}

/* REVIEW */
.review {
    background: #f9f9f9;
    padding: 15px;
    border-radius: 10px;
    margin: 10px 0;
    text-align: left;
}

/* MAP */
iframe {
    border-radius: 10px;
}

/* STICKY */
.sticky {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.sticky a {
    flex: 1;
    padding: 15px;
    text-align: center;
    color: white;
    text-decoration: none;
}

.sticky .call { background: #ff9800; }
.sticky .whatsapp { background: #25D366; }

</style>

</head>
