<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chennai Driver Service</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    margin: 0;
    background: #f4f7fb;
}

/* HERO */
.hero {
    background: linear-gradient(to right, #1e3c72, #2a5298);
    color: white;
    padding: 30px 15px;
    text-align: center;
}

.hero h1 {
    font-size: 24px;
    margin-bottom: 10px;
}

.hero p {
    font-size: 14px;
}

/* BUTTONS */
.btn {
    display: block;
    width: 90%;
    margin: 10px auto;
    padding: 14px;
    border-radius: 30px;
    text-decoration: none;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

.call { background: #ff9800; }
.whatsapp { background: #25D366; }

/* CONTAINER */
.container {
    padding: 15px;
}

/* BOX */
.box {
    background: white;
    margin-bottom: 15px;
    padding: 15px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* DRIVER */
.driver {
    text-align: center;
}

.driver img {
    width: 110px;
    height: 110px;
    border-radius: 50%;
    object-fit: cover;
}

/* SERVICES */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
}

.service {
    background: #f1f3f6;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    font-size: 14px;
}

/* FORM */
input, select {
    width: 100%;
    padding: 14px;
    margin-bottom: 10px;
    border-radius: 10px;
    border: 1px solid #ccc;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 30px;
    border: none;
    background: #25D366;
    color: white;
    font-size: 16px;
    font-weight: bold;
}

/* STICKY */
.sticky {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
}

.sticky a {
    flex: 1;
    padding: 14px;
    text-align: center;
    color: white;
    text-decoration: none;
    font-size: 16px;
}

.sticky .call { background: #ff9800; }
.sticky .whatsapp { background: #25D366; }

</style>
</head>

<body>

<div class="hero">
    <h1>🚗 Chennai Driver Service</h1>
    <p>Safe • Reliable • Friendly</p>

    <a class="btn call" href="tel:919941156562">📞 Call Now</a>
    <a class="btn whatsapp" target="_blank" href="https://wa.me/919941156562">💬 WhatsApp</a>
</div>

<div class="container">

<div class="box driver">
    <h3>🧑‍✈️ Your Driver</h3>
    <img src="driver.jpg">
    <p><b>Experienced & Trusted Driver</b></p>
</div>

<div class="box">
    <h3>🚘 Services</h3>
    <div class="grid">
        <div class="service">🚗 Local</div>
        <div class="service">🛣️ Outstation</div>
        <div class="service">🌙 Night</div>
        <div class="service">📅 Full Day</div>
    </div>
</div>

<div class="box">
    <h3>📋 Book Driver</h3>

    <input type="text" id="name" placeholder="Your Name">
    <input type="tel" id="phone" placeholder="Mobile Number">

    <select id="service">
        <option>Local Trip</option>
        <option>Outstation Trip</option>
        <option>Night Driving</option>
    </select>

    <button onclick="sendWhatsApp()">📲 Send via WhatsApp</button>
</div>

</div>

<div class="sticky">
    <a class="call" href="tel:919941156562">📞 Call</a>
    <a class="whatsapp" target="_blank" href="https://wa.me/919941156562">💬 WhatsApp</a>
</div>

<script>
function sendWhatsApp() {
    var name = document.getElementById("name").value;
    var phone = document.getElementById("phone").value;
    var service = document.getElementById("service").value;

    var message = "Booking Request:%0AName: " + name + "%0APhone: " + phone + "%0AService: " + service;

    window.open("https://wa.me/919941156562?text=" + message, "_blank");
}
</script>

</body>
</html>
